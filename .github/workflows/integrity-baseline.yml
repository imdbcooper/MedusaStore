name: Integrity Baseline

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  integrity-baseline:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            medusa-agency-boilerplate/package-lock.json
            medusa-agency-boilerplate-storefront/package-lock.json

      - name: Set up Chrome for browser smoke
        id: chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install backend dependencies
        run: npm ci --prefix ./medusa-agency-boilerplate

      - name: Install storefront dependencies
        run: npm ci --prefix ./medusa-agency-boilerplate-storefront

      - name: Materialize root env from template-safe baseline
        run: cp .env.example .env

      - name: Bootstrap baseline runtime and run integrity gate
        env:
          CI: true
          BROWSER_SMOKE_BROWSER_BIN: ${{ steps.chrome.outputs['chrome-path'] }}
        run: |
          set -euo pipefail

          source ./scripts/lib/common.sh
          load_root_env

          cleanup() {
            local exit_code="$?"

            if [[ -f /tmp/integrity-baseline-dev.pid ]]; then
              kill "$(cat /tmp/integrity-baseline-dev.pid)" >/dev/null 2>&1 || true
            fi

            docker compose down >/dev/null 2>&1 || true

            exit "$exit_code"
          }
          trap cleanup EXIT

          npm run bootstrap
          npm run preflight

          nohup npm run dev >/tmp/integrity-baseline-dev.log 2>&1 &
          echo $! >/tmp/integrity-baseline-dev.pid

          for _ in $(seq 1 120); do
            if curl -fsS "${MEDUSA_BACKEND_URL}/health" >/dev/null 2>&1 && \
               curl -fsS "http://localhost:${STOREFRONT_PORT}" >/dev/null 2>&1; then
              break
            fi

            sleep 1
          done

          if ! curl -fsS "${MEDUSA_BACKEND_URL}/health" >/dev/null 2>&1; then
            echo "Backend runtime did not become ready. Tail of npm run dev log:" >&2
            tail -n 200 /tmp/integrity-baseline-dev.log >&2 || true
            exit 1
          fi

          if ! curl -fsS "http://localhost:${STOREFRONT_PORT}" >/dev/null 2>&1; then
            echo "Storefront runtime did not become ready. Tail of npm run dev log:" >&2
            tail -n 200 /tmp/integrity-baseline-dev.log >&2 || true
            exit 1
          fi

          npm run integrity:baseline

      - name: Print runtime log on failure
        if: failure()
        run: |
          if [[ -f /tmp/integrity-baseline-dev.log ]]; then
            tail -n 200 /tmp/integrity-baseline-dev.log
          fi
