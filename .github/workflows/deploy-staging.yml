name: Deploy Staging

on:
  workflow_dispatch:
    inputs:
      branch:
        description: Git branch to deploy
        required: true
        default: main
concurrency:
  group: staging-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate staging compose config
        run: docker compose -f docker-compose.prod.yml --env-file .env.example config -q

      - name: Install SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}

      - name: Add deploy host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync S3 secrets to remote .env
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          S3_REGION: ${{ secrets.S3_REGION }}
          S3_FILE_URL: ${{ secrets.S3_FILE_URL }}
        run: |
          ssh "${DEPLOY_USER}@${DEPLOY_HOST}" "
            set -euo pipefail
            ENV_FILE='${DEPLOY_PATH}/.env'
            update_env_var() {
              local key=\$1 val=\$2
              if grep -qE \"^\${key}=\" \"\$ENV_FILE\" 2>/dev/null; then
                sed -i \"s|^\${key}=.*|\${key}=\${val}|\" \"\$ENV_FILE\"
              else
                echo \"\${key}=\${val}\" >> \"\$ENV_FILE\"
              fi
            }
            update_env_var S3_ACCESS_KEY_ID '${S3_ACCESS_KEY_ID}'
            update_env_var S3_SECRET_ACCESS_KEY '${S3_SECRET_ACCESS_KEY}'
            update_env_var S3_ENDPOINT '${S3_ENDPOINT}'
            update_env_var S3_BUCKET '${S3_BUCKET}'
            update_env_var S3_REGION '${S3_REGION}'
            update_env_var S3_FILE_URL '${S3_FILE_URL}'
            echo 'S3 secrets synced to remote .env'
          "

      - name: Run remote staging deploy
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_BRANCH: ${{ github.event.inputs.branch || github.ref_name }}
        run: |
          ssh "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "DEPLOY_PATH='${DEPLOY_PATH}' DEPLOY_BRANCH='${DEPLOY_BRANCH}' bash '${DEPLOY_PATH}/scripts/github-deploy-staging.sh'"
