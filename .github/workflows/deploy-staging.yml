name: Deploy Staging

on:
  workflow_dispatch:
    inputs:
      branch:
        description: Git branch to deploy
        required: true
        default: main
concurrency:
  group: staging-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate staging compose template
        run: docker compose -f docker-compose.prod.yml --env-file .env.staging.example config -q

      - name: Render staging env from GitHub Secrets and Variables
        env:
          DEPLOY_DOMAIN: ${{ secrets.DEPLOY_DOMAIN || vars.DEPLOY_DOMAIN }}
          ACME_EMAIL: ${{ secrets.ACME_EMAIL || vars.ACME_EMAIL }}
          HTTP_PORT: ${{ secrets.HTTP_PORT || vars.HTTP_PORT }}
          HTTPS_PORT: ${{ secrets.HTTPS_PORT || vars.HTTPS_PORT }}
          COMPOSE_PROJECT_NAME: ${{ secrets.COMPOSE_PROJECT_NAME || vars.COMPOSE_PROJECT_NAME }}
          NODE_ENV: ${{ secrets.NODE_ENV || vars.NODE_ENV }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER || vars.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD || vars.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB || vars.POSTGRES_DB }}
          DOCKER_DATABASE_URL: ${{ secrets.DOCKER_DATABASE_URL || vars.DOCKER_DATABASE_URL }}
          DOCKER_PAYLOAD_DATABASE_URL: ${{ secrets.DOCKER_PAYLOAD_DATABASE_URL || vars.DOCKER_PAYLOAD_DATABASE_URL }}
          DATABASE_URL: ${{ secrets.DATABASE_URL || vars.DATABASE_URL }}
          PAYLOAD_DATABASE_URL: ${{ secrets.PAYLOAD_DATABASE_URL || vars.PAYLOAD_DATABASE_URL }}
          DOCKER_REDIS_URL: ${{ secrets.DOCKER_REDIS_URL || vars.DOCKER_REDIS_URL }}
          REDIS_URL: ${{ secrets.REDIS_URL || vars.REDIS_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET || vars.JWT_SECRET }}
          COOKIE_SECRET: ${{ secrets.COOKIE_SECRET || vars.COOKIE_SECRET }}
          MEDUSA_BACKEND_URL: ${{ secrets.MEDUSA_BACKEND_URL || vars.MEDUSA_BACKEND_URL }}
          DOCKER_MEDUSA_BACKEND_URL: ${{ secrets.DOCKER_MEDUSA_BACKEND_URL || vars.DOCKER_MEDUSA_BACKEND_URL }}
          MEDUSA_ADMIN_BACKEND_URL: ${{ secrets.MEDUSA_ADMIN_BACKEND_URL || vars.MEDUSA_ADMIN_BACKEND_URL }}
          MEDUSA_ADMIN_SECRET_API_KEY: ${{ secrets.MEDUSA_ADMIN_SECRET_API_KEY || vars.MEDUSA_ADMIN_SECRET_API_KEY }}
          NEXT_PUBLIC_MEDUSA_BACKEND_URL: ${{ secrets.NEXT_PUBLIC_MEDUSA_BACKEND_URL || vars.NEXT_PUBLIC_MEDUSA_BACKEND_URL }}
          DOCKER_NEXT_PUBLIC_MEDUSA_BACKEND_URL: ${{ secrets.DOCKER_NEXT_PUBLIC_MEDUSA_BACKEND_URL || vars.DOCKER_NEXT_PUBLIC_MEDUSA_BACKEND_URL }}
          NEXT_PUBLIC_BASE_URL: ${{ secrets.NEXT_PUBLIC_BASE_URL || vars.NEXT_PUBLIC_BASE_URL }}
          DOCKER_NEXT_PUBLIC_BASE_URL: ${{ secrets.DOCKER_NEXT_PUBLIC_BASE_URL || vars.DOCKER_NEXT_PUBLIC_BASE_URL }}
          NEXT_PUBLIC_DEFAULT_REGION: ${{ secrets.NEXT_PUBLIC_DEFAULT_REGION || vars.NEXT_PUBLIC_DEFAULT_REGION }}
          STORE_CORS: ${{ secrets.STORE_CORS || vars.STORE_CORS }}
          ADMIN_CORS: ${{ secrets.ADMIN_CORS || vars.ADMIN_CORS }}
          AUTH_CORS: ${{ secrets.AUTH_CORS || vars.AUTH_CORS }}
          STOREFRONT_URL: ${{ secrets.STOREFRONT_URL || vars.STOREFRONT_URL }}
          EMAIL_VERIFICATION_TOKEN_TTL_MINUTES: ${{ secrets.EMAIL_VERIFICATION_TOKEN_TTL_MINUTES || vars.EMAIL_VERIFICATION_TOKEN_TTL_MINUTES }}
          EMAIL_VERIFICATION_REDIRECT_PATH: ${{ secrets.EMAIL_VERIFICATION_REDIRECT_PATH || vars.EMAIL_VERIFICATION_REDIRECT_PATH }}
          PASSWORD_RESET_TOKEN_TTL_MINUTES: ${{ secrets.PASSWORD_RESET_TOKEN_TTL_MINUTES || vars.PASSWORD_RESET_TOKEN_TTL_MINUTES }}
          PASSWORD_RESET_REDIRECT_PATH: ${{ secrets.PASSWORD_RESET_REDIRECT_PATH || vars.PASSWORD_RESET_REDIRECT_PATH }}
          PASSWORD_MIN_LENGTH: ${{ secrets.PASSWORD_MIN_LENGTH || vars.PASSWORD_MIN_LENGTH }}
          PASSWORD_REQUIRE_LETTER: ${{ secrets.PASSWORD_REQUIRE_LETTER || vars.PASSWORD_REQUIRE_LETTER }}
          PASSWORD_REQUIRE_DIGIT: ${{ secrets.PASSWORD_REQUIRE_DIGIT || vars.PASSWORD_REQUIRE_DIGIT }}
          BRAND_NAME: ${{ secrets.BRAND_NAME || vars.BRAND_NAME }}
          BRAND_LOGO_URL: ${{ secrets.BRAND_LOGO_URL || vars.BRAND_LOGO_URL }}
          BRAND_PRIMARY_COLOR: ${{ secrets.BRAND_PRIMARY_COLOR || vars.BRAND_PRIMARY_COLOR }}
          BRAND_ACCENT_COLOR: ${{ secrets.BRAND_ACCENT_COLOR || vars.BRAND_ACCENT_COLOR }}
          BRAND_TEXT_COLOR: ${{ secrets.BRAND_TEXT_COLOR || vars.BRAND_TEXT_COLOR }}
          BRAND_BACKGROUND_COLOR: ${{ secrets.BRAND_BACKGROUND_COLOR || vars.BRAND_BACKGROUND_COLOR }}
