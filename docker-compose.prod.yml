services:
  medusa-db:
    image: postgres:15-alpine
    container_name: medusastore-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-medusa}
    volumes:
      - medusastore-db-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB:-medusa}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    restart: unless-stopped
    networks:
      - medusastore

  medusa-redis:
    image: redis:7-alpine
    container_name: medusastore-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - medusastore-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s
    restart: unless-stopped
    networks:
      - medusastore

  ai-assistant:
    build:
      context: ai-assistant
      dockerfile: Dockerfile
    image: medusastore-ai-assistant:prod
    container_name: medusastore-ai-assistant
    profiles: ["ai-assistant"]
    env_file:
      - path: .env
        required: false
    environment:
      AI_ASSISTANT_ENV: production
      AI_ASSISTANT_API_TOKEN: ${AI_ASSISTANT_API_TOKEN}
      AI_ASSISTANT_CORS_ORIGINS: ${AI_ASSISTANT_CORS_ORIGINS:-https://${DEPLOY_DOMAIN:-slavx.mooo.com}}
      AI_ASSISTANT_RETRIEVAL_MODE: ${AI_ASSISTANT_RETRIEVAL_MODE:-markdown}
      ASSISTANT_POSTGRES_URI: ${ASSISTANT_POSTGRES_URI}
      MEDUSA_BACKEND_URL: ${DOCKER_MEDUSA_BACKEND_URL:-http://medusa-backend:9000}
      MEDUSA_STORE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY:-}
      QDRANT_URL: ${QDRANT_URL:-}
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-none}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      POLZA_API_KEY: ${POLZA_API_KEY:-}
    depends_on:
      medusa-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python - <<'PY'\nimport urllib.request\nurllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=5).read()\nPY"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - medusastore

  medusa-backend:
    build:
      context: .
      dockerfile: docker/medusa-backend/Dockerfile
    image: medusastore-backend:prod
    container_name: medusastore-backend
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DOCKER_DATABASE_URL:-postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@medusa-db:5432/${POSTGRES_DB:-medusa}?sslmode=disable}
      REDIS_URL: ${DOCKER_REDIS_URL:-redis://medusa-redis:6379}
      DATABASE_DRIVER_OPTIONS: '{"connection":{"ssl":false}}'
      MEDUSA_DATABASE_DRIVER_OPTIONS: '{"connection":{"ssl":false}}'
      MEDUSA_BACKEND_URL: ${MEDUSA_BACKEND_URL:-http://medusa-backend:9000}
      RUN_MEDUSA_MIGRATIONS: ${RUN_MEDUSA_MIGRATIONS:-true}
      AI_ASSISTANT_ENABLED: ${AI_ASSISTANT_ENABLED:-false}
      AI_ASSISTANT_BASE_URL: ${AI_ASSISTANT_BASE_URL:-http://ai-assistant:8000/api/v1}
      AI_ASSISTANT_SERVER_TOKEN: ${AI_ASSISTANT_SERVER_TOKEN:-}
      AI_ASSISTANT_TIMEOUT_MS: ${AI_ASSISTANT_TIMEOUT_MS:-60000}
    depends_on:
      medusa-db:
        condition: service_healthy
      medusa-redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - medusastore

  payload-cms:
    build:
      context: .
      dockerfile: docker/payload/Dockerfile
    image: medusastore-payload:prod
    container_name: medusastore-payload
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: production
      PAYLOAD_PORT: ${PAYLOAD_PORT:-3100}
      PAYLOAD_DATABASE_URL: ${DOCKER_PAYLOAD_DATABASE_URL:-postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@medusa-db:5432/payload_cms?sslmode=disable}
      PAYLOAD_CMS_URL: ${PAYLOAD_CMS_URL:-http://payload-cms:3100}
      RUN_PAYLOAD_MIGRATIONS: ${RUN_PAYLOAD_MIGRATIONS:-false}
      RUN_PAYLOAD_SEED: ${RUN_PAYLOAD_SEED:-false}
    depends_on:
      medusa-db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - medusastore

  storefront:
    build:
      context: .
      dockerfile: docker/storefront/Dockerfile
      args:
        MEDUSA_BACKEND_URL: ${DOCKER_MEDUSA_BACKEND_URL:-http://medusa-backend:9000}
        NEXT_PUBLIC_MEDUSA_BACKEND_URL: ${DOCKER_NEXT_PUBLIC_MEDUSA_BACKEND_URL:-http://${DEPLOY_DOMAIN:-slavx.mooo.com}}
        NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY: ${NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY:-pk_build_placeholder}
        NEXT_PUBLIC_BASE_URL: ${DOCKER_NEXT_PUBLIC_BASE_URL:-http://${DEPLOY_DOMAIN:-slavx.mooo.com}}
        NEXT_PUBLIC_DEFAULT_REGION: ${NEXT_PUBLIC_DEFAULT_REGION:-ru}
        PAYLOAD_ENABLED: ${PAYLOAD_ENABLED:-false}
        PAYLOAD_CMS_URL: ${DOCKER_PAYLOAD_CMS_URL:-http://payload-cms:3100}
        NEXT_PUBLIC_AI_ASSISTANT_WIDGET_ENABLED: ${NEXT_PUBLIC_AI_ASSISTANT_WIDGET_ENABLED:-false}
        NEXT_PUBLIC_AI_ASSISTANT_CHAT_ENDPOINT: ${NEXT_PUBLIC_AI_ASSISTANT_CHAT_ENDPOINT:-/store/assistant/chat}
    image: medusastore-storefront:prod
    container_name: medusastore-storefront
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: production
      STOREFRONT_PORT: ${STOREFRONT_PORT:-8000}
      MEDUSA_BACKEND_URL: ${DOCKER_MEDUSA_BACKEND_URL:-http://medusa-backend:9000}
      NEXT_PUBLIC_MEDUSA_BACKEND_URL: ${DOCKER_NEXT_PUBLIC_MEDUSA_BACKEND_URL:-http://${DEPLOY_DOMAIN:-slavx.mooo.com}}
      NEXT_PUBLIC_BASE_URL: ${DOCKER_NEXT_PUBLIC_BASE_URL:-http://${DEPLOY_DOMAIN:-slavx.mooo.com}}
      PAYLOAD_CMS_URL: ${DOCKER_PAYLOAD_CMS_URL:-http://payload-cms:3100}
      NEXT_PUBLIC_AI_ASSISTANT_WIDGET_ENABLED: ${NEXT_PUBLIC_AI_ASSISTANT_WIDGET_ENABLED:-false}
      NEXT_PUBLIC_AI_ASSISTANT_CHAT_ENDPOINT: ${NEXT_PUBLIC_AI_ASSISTANT_CHAT_ENDPOINT:-/store/assistant/chat}
    depends_on:
      medusa-backend:
        condition: service_healthy
      payload-cms:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS -L http://127.0.0.1:$${STOREFRONT_PORT:-8000}/ru/about >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 90s
    restart: unless-stopped
    networks:
      - medusastore

  caddy:
    image: caddy:2-alpine
    container_name: medusastore-caddy
    environment:
      DEPLOY_DOMAIN: ${DEPLOY_DOMAIN:-slavx.mooo.com}
      ACME_EMAIL: ${ACME_EMAIL:-admin@slavx.mooo.com}
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - medusastore-caddy-data:/data
      - medusastore-caddy-config:/config
    depends_on:
      storefront:
        condition: service_healthy
      medusa-backend:
        condition: service_healthy
      payload-cms:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-check-certificate -qO- http://127.0.0.1/healthz | grep -q ok"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - medusastore

networks:
  medusastore:
    driver: bridge

volumes:
  medusastore-db-data:
  medusastore-redis-data:
  medusastore-caddy-data:
  medusastore-caddy-config:
